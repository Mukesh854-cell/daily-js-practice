<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array-method-practice</title>
</head>

<body>

    <script>

        // FILTER AGE
        const ages = [12, 45, 8, 67, 30, 15, 5];

        const filteredAges = ages.filter((age) => {
            return age >= 18;
        });

        console.log(ages);
        console.log(filteredAges);

        // FILTER FRUITS
        const fruits = ['apple', 'banana', 'kiwi', 'grape', 'fig', 'mango'];

        const filteredFruits = fruits.filter((fruit) => {
            return fruit.length >= 4;
        });

        console.log(fruits);
        console.log(filteredFruits);

        // MAP 10% DISCOUNT
        const prices = [10, 25, 50, 100];

        const discountedPrice = prices.map((price) => {
            return price - (price * 10) / 100;
        });

        console.log(prices);
        console.log(discountedPrice);

        // MAP CAPITALIZE FIRST CHARACTER
        const name = ['amit', 'neha', 'rahul'];

        const firstCharUpper = name.map((n) => {
            const firstChar = n.charAt(0).toUpperCase();
            const restOfWord = n.slice(1);
            return firstChar + restOfWord;
        });

        console.log(name);
        console.log(firstCharUpper);

        // FIND AGE THAT IS UNDER 18
        const users = [
            { name: 'Amit', age: 25 },
            { name: 'Neha', age: 17 },
            { name: 'Rahul', age: 30 }
        ];

        const underEighteen = users.find((user) => {
            return user.age < 18;
        });

        console.log(users);
        console.log(underEighteen);

        // POP AND PUSH METHOD
        const vegetables = ['potato', 'tomato', 'carrot'];

        vegetables.push('cucumber');
        console.log(vegetables);

        vegetables.pop();
        console.log(vegetables);

        // SHIFT() AND UNSHIFT() METHOD
        const students = ['raj', 'rajesh', 'rajiv'];

        students.unshift('rakesh');
        console.log(students);

        students.shift();
        console.log(students);

        // SORT METHOD
        const numbers = [5, 2, 9, 1, 7];

        const arrangedNum = numbers.sort();
        console.log(arrangedNum);

        const bigNumbers = [100, 25, 9000, 1];
        console.log(bigNumbers.sort((a, b) => {
            return a - b;
        }));

        // .SLICE() AND .SPLICE() METHOD
        const letters = ['a', 'b', 'c', 'd', 'e'];

        const sliceResult = letters.slice(1, 3);
        console.log(sliceResult);
        console.log(letters);

        const spliceResult = letters.splice(1, 2);
        console.log(spliceResult);
        console.log(letters);

        const nums = [1, 2, 3, 4, 5];
        nums.splice(1, 1, 'X', 'Y');
        console.log(nums);

        // .REDUCE() METHOD
        const scores = [45, 89, 23, 67, 12];

        const maximum = scores.reduce((accumulator, current) => {
            // return current > accumulator ? current : accumulator;
            if (current > accumulator) {
                return current;
            } else {
                return accumulator;
            }
        }, scores[0])

        console.log(maximum);

    </script>
</body>

</html>
