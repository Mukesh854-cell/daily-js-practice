<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>name-filter</title>
</head>
<body>
    <input type="text" class="input-text">    
    <ul class="list"></ul>

    <script>
        const inputText = document.querySelector('.input-text');
        const listItem = document.querySelector('.list');

        const name = ['Amit', 'Neha', 'Rahul', 'Priya', 'Karan'];

        inputText.addEventListener('input', () => {
            const inputValue =  inputText.value;
            listItem.innerHTML = '';
            
            const filteredName = name.filter((n) => {
                return n.includes(inputValue);
            });
            
            filteredName.forEach((n) => {
                const listType = document.createElement('li');
                listType.innerHTML = n;
                listItem.appendChild(listType); 
            });
        });
    </script>
</body>
</html>
